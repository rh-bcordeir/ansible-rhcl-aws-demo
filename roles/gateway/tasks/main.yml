---
# -----------------------------------------------------------------------------
# Optional: GatewayClass for the built-in OpenShift Gateway controller.
# Only created when NOT using Service Mesh (gateway_class == openshift-default).
# -----------------------------------------------------------------------------
- name: Create the openshift-default GatewayClass
  kubernetes.core.k8s:
    definition:
      apiVersion: gateway.networking.k8s.io/v1
      kind: GatewayClass
      metadata:
        name: openshift-default
      spec:
        controllerName: openshift.io/gateway-controller/v1
  when: gateway_class == 'openshift-default'

# -----------------------------------------------------------------------------
# Gateway
# -----------------------------------------------------------------------------
- name: Ensure the api-gateway namespace exists
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ api_gateway_namespace }}"

- name: Create the ingress Gateway
  kubernetes.core.k8s:
    definition:
      apiVersion: gateway.networking.k8s.io/v1
      kind: Gateway
      metadata:
        name: "{{ gateway_name }}"
        namespace: "{{ api_gateway_namespace }}"
        labels:
          kuadrant.io/gateway: "true"
      spec:
        gatewayClassName: "{{ gateway_class }}"
        listeners:
          - name: http
            port: 80
            protocol: HTTP
            allowedRoutes:
              namespaces:
                from: All

# -----------------------------------------------------------------------------
# HTTPRoutes (live in the application namespace, target the backend Service).
# Separate routes so each can be targeted as a whole by an AuthPolicy
# (the standard Gateway API on this cluster does not support per-rule targeting).
# -----------------------------------------------------------------------------
- name: Create the HTTPRoute for the public movies endpoints
  kubernetes.core.k8s:
    definition:
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: "{{ movies_route_name }}"
        namespace: "{{ app_namespace }}"
      spec:
        parentRefs:
          - name: "{{ gateway_name }}"
            namespace: "{{ api_gateway_namespace }}"
        rules:
          - matches: "{{ movies_route_matches }}"
            backendRefs:
              - name: "{{ app_service_name }}"
                port: "{{ app_service_port }}"

- name: Create the HTTPRoute for the restricted directors endpoint
  kubernetes.core.k8s:
    definition:
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: "{{ directors_route_name }}"
        namespace: "{{ app_namespace }}"
      spec:
        parentRefs:
          - name: "{{ gateway_name }}"
            namespace: "{{ api_gateway_namespace }}"
        rules:
          - matches: "{{ directors_route_matches }}"
            backendRefs:
              - name: "{{ app_service_name }}"
                port: "{{ app_service_port }}"

- name: Create the HTTPRoute for the public Swagger/OpenAPI endpoint
  kubernetes.core.k8s:
    definition:
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: "{{ swagger_route_name }}"
        namespace: "{{ app_namespace }}"
      spec:
        parentRefs:
          - name: "{{ gateway_name }}"
            namespace: "{{ api_gateway_namespace }}"
        rules:
          - matches: "{{ swagger_route_matches }}"
            backendRefs:
              - name: "{{ app_service_name }}"
                port: "{{ app_service_port }}"

# -----------------------------------------------------------------------------
# Auth: deny-all on the Gateway, allow API-key holders on the HTTPRoute
# -----------------------------------------------------------------------------
- name: Wait for the AuthPolicy CRD to be established
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: authpolicies.kuadrant.io
  register: _auth_crd
  retries: "{{ crd_wait_retries }}"
  delay: "{{ crd_wait_delay }}"
  until: _auth_crd.resources | length > 0

- name: Create the default deny-all AuthPolicy on the Gateway
  kubernetes.core.k8s:
    definition:
      apiVersion: kuadrant.io/v1
      kind: AuthPolicy
      metadata:
        name: "{{ gateway_name }}-auth"
        namespace: "{{ api_gateway_namespace }}"
      spec:
        targetRef:
          group: gateway.networking.k8s.io
          kind: Gateway
          name: "{{ gateway_name }}"
        defaults:
          when:
            - predicate: "request.path != '/health'"
          rules:
            authorization:
              deny-all:
                opa:
                  rego: "allow = false"
            response:
              unauthorized:
                headers:
                  "content-type":
                    value: application/json
                body:
                  value: |
                    {
                      "error": "Forbidden",
                      "message": "Acesso negado por padrão pelo gateway. Se você é o administrador do serviço, crie uma auth policy específica para a rota."
                    }

- name: Create the API-key AuthPolicy on the movies HTTPRoute
  kubernetes.core.k8s:
    definition:
      apiVersion: kuadrant.io/v1
      kind: AuthPolicy
      metadata:
        name: "{{ movies_route_name }}-auth"
        namespace: "{{ app_namespace }}"
      spec:
        targetRef:
          group: gateway.networking.k8s.io
          kind: HTTPRoute
          name: "{{ movies_route_name }}"
        defaults:
          rules:
            authentication:
              "api-key-users":
                apiKey:
                  selector:
                    matchLabels:
                      app: "{{ api_key_app_label }}"
                  allNamespaces: true        # secrets live in kuadrant-system
                credentials:
                  authorizationHeader:
                    prefix: APIKEY
            response:
              success:
                filters:
                  "identity":
                    json:
                      properties:
                        "userid":
                          selector: auth.identity.metadata.annotations.secret\.kuadrant\.io/user-id

- name: Create the web-app-only AuthPolicy on the directors HTTPRoute
  kubernetes.core.k8s:
    definition:
      apiVersion: kuadrant.io/v1
      kind: AuthPolicy
      metadata:
        name: "{{ directors_route_name }}-auth"
        namespace: "{{ app_namespace }}"
      spec:
        targetRef:
          group: gateway.networking.k8s.io
          kind: HTTPRoute
          name: "{{ directors_route_name }}"
        defaults:
          rules:
            authentication:
              "api-key-users":
                apiKey:
                  selector:
                    matchLabels:
                      app: "{{ api_key_app_label }}"
                  allNamespaces: true
                credentials:
                  authorizationHeader:
                    prefix: APIKEY
            authorization:
              "web-only":
                patternMatching:
                  patterns:
                    - predicate: >-
                        auth.identity.metadata.annotations["secret.kuadrant.io/user-id"] == "{{ directors_allowed_user }}"
            response:
              success:
                filters:
                  "identity":
                    json:
                      properties:
                        "userid":
                          selector: auth.identity.metadata.annotations.secret\.kuadrant\.io/user-id
              unauthorized:
                headers:
                  "content-type":
                    value: application/json
                body:
                  value: |
                    {
                      "error": "Forbidden",
                      "message": "Este endpoint está disponível apenas para o web-app."
                    }

- name: Create the public (anonymous) AuthPolicy on the swagger HTTPRoute
  kubernetes.core.k8s:
    definition:
      apiVersion: kuadrant.io/v1
      kind: AuthPolicy
      metadata:
        name: "{{ swagger_route_name }}-auth"
        namespace: "{{ app_namespace }}"
      spec:
        targetRef:
          group: gateway.networking.k8s.io
          kind: HTTPRoute
          name: "{{ swagger_route_name }}"
        defaults:
          rules:
            authentication:
              "public":
                anonymous: {}        # allows everyone; overrides the gateway deny-all

# -----------------------------------------------------------------------------
# Rate limiting per identity
# -----------------------------------------------------------------------------
- name: Wait for the RateLimitPolicy CRD to be established
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: ratelimitpolicies.kuadrant.io
  register: _rlp_crd
  retries: "{{ crd_wait_retries }}"
  delay: "{{ crd_wait_delay }}"
  until: _rlp_crd.resources | length > 0

- name: Create the RateLimitPolicy on the movies HTTPRoute
  kubernetes.core.k8s:
    definition:
      apiVersion: kuadrant.io/v1
      kind: RateLimitPolicy
      metadata:
        name: "{{ movies_route_name }}-rlp"
        namespace: "{{ app_namespace }}"
      spec:
        targetRef:
          group: gateway.networking.k8s.io
          kind: HTTPRoute
          name: "{{ movies_route_name }}"
        limits:
          web-app-limit:
            rates:
              - limit: "{{ rate_limits['web-app'].limit }}"
                window: "{{ rate_limits['web-app'].window }}"
            counters:
              - expression: auth.identity.userid
            when:
              - predicate: "auth.identity.userid == 'web-app'"
          mobile-app-limit:
            rates:
              - limit: "{{ rate_limits['mobile-app'].limit }}"
                window: "{{ rate_limits['mobile-app'].window }}"
            counters:
              - expression: auth.identity.userid
            when:
              - predicate: "auth.identity.userid == 'mobile-app'"
