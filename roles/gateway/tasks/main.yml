---
# -----------------------------------------------------------------------------
# Optional: GatewayClass for the built-in OpenShift Gateway controller.
# Only created when NOT using Service Mesh (gateway_class == openshift-default).
# -----------------------------------------------------------------------------
- name: Create the openshift-default GatewayClass
  kubernetes.core.k8s:
    definition:
      apiVersion: gateway.networking.k8s.io/v1
      kind: GatewayClass
      metadata:
        name: openshift-default
      spec:
        controllerName: openshift.io/gateway-controller/v1
  when: gateway_class == 'openshift-default'

# -----------------------------------------------------------------------------
# Gateway
# -----------------------------------------------------------------------------
- name: Ensure the api-gateway namespace exists
  kubernetes.core.k8s:
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: "{{ api_gateway_namespace }}"

- name: Create the ingress Gateway
  kubernetes.core.k8s:
    definition:
      apiVersion: gateway.networking.k8s.io/v1
      kind: Gateway
      metadata:
        name: "{{ gateway_name }}"
        namespace: "{{ api_gateway_namespace }}"
        labels:
          kuadrant.io/gateway: "true"
      spec:
        gatewayClassName: "{{ gateway_class }}"
        listeners:
          - name: http
            port: 80
            protocol: HTTP
            allowedRoutes:
              namespaces:
                from: All

# -----------------------------------------------------------------------------
# Single HTTPRoute (lives in the application namespace, targets the backend
# Service). All endpoints share one route; the AuthPolicy below differentiates
# behaviour per path with `when` predicates.
# -----------------------------------------------------------------------------
- name: Create the movies-quarkus HTTPRoute
  kubernetes.core.k8s:
    definition:
      apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      metadata:
        name: "{{ route_name }}"
        namespace: "{{ app_namespace }}"
        labels:
          # let the Kuadrant kube-state-metrics exporter join route state with
          # the Service/Deployment traffic metrics (must match the real names)
          service: "{{ app_service_name }}"
          deployment: "{{ app_deployment_name | default(app_service_name) }}"
      spec:
        parentRefs:
          - name: "{{ gateway_name }}"
            namespace: "{{ api_gateway_namespace }}"
        rules:
          - matches: "{{ route_matches }}"
            backendRefs:
              - name: "{{ app_service_name }}"
                port: "{{ app_service_port }}"

# -----------------------------------------------------------------------------
# Auth: deny-all on the Gateway, allow API-key holders on the HTTPRoute
# -----------------------------------------------------------------------------
- name: Wait for the AuthPolicy CRD to be established
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: authpolicies.kuadrant.io
  register: _auth_crd
  retries: "{{ crd_wait_retries }}"
  delay: "{{ crd_wait_delay }}"
  until: _auth_crd.resources | length > 0

- name: Create the default deny-all AuthPolicy on the Gateway
  kubernetes.core.k8s:
    definition:
      apiVersion: kuadrant.io/v1
      kind: AuthPolicy
      metadata:
        name: "{{ gateway_name }}-auth"
        namespace: "{{ api_gateway_namespace }}"
      spec:
        targetRef:
          group: gateway.networking.k8s.io
          kind: Gateway
          name: "{{ gateway_name }}"
        defaults:
          when:
            - predicate: "request.path != '/health'"
          rules:
            authorization:
              deny-all:
                opa:
                  rego: "allow = false"
            response:
              unauthorized:
                headers:
                  "content-type":
                    value: application/json
                body:
                  value: |
                    {
                      "error": "Forbidden",
                      "message": "Acesso negado por padrão pelo gateway. Se você é o administrador do serviço, crie uma auth policy específica para a rota."
                    }

- name: Create the AuthPolicy on the movies-quarkus HTTPRoute
  kubernetes.core.k8s:
    # One policy for the whole route. Per-path behaviour is selected with `when`
    # predicates on request.path:
    #   - /q/openapi        -> anonymous (public), API-key rule is skipped
    #   - everything else   -> a valid API key is required
    #   - /api/v1/directors -> additionally requires the web-app identity
    definition:
      apiVersion: kuadrant.io/v1
      kind: AuthPolicy
      metadata:
        name: "{{ route_name }}-auth"
        namespace: "{{ app_namespace }}"
      spec:
        targetRef:
          group: gateway.networking.k8s.io
          kind: HTTPRoute
          name: "{{ route_name }}"
        defaults:
          rules:
            authentication:
              "api-key-users":
                apiKey:
                  selector:
                    matchLabels:
                      app: "{{ api_key_app_label }}"
                  allNamespaces: true        # secrets live in kuadrant-system
                credentials:
                  authorizationHeader:
                    prefix: APIKEY
                when:
                  - predicate: "request.path != '{{ public_path }}'"
              "public":
                anonymous: {}                 # public OpenAPI endpoint only
                when:
                  - predicate: "request.path == '{{ public_path }}'"
            authorization:
              "web-only":
                patternMatching:
                  patterns:
                    - predicate: >-
                        auth.identity.metadata.annotations["secret.kuadrant.io/user-id"] == "{{ directors_allowed_user }}"
                when:
                  - predicate: "request.path == '{{ directors_path }}'"
            response:
              success:
                filters:
                  "identity":
                    json:
                      properties:
                        "userid":
                          selector: auth.identity.metadata.annotations.secret\.kuadrant\.io/user-id
              unauthorized:
                headers:
                  "content-type":
                    value: application/json
                body:
                  value: |
                    {
                      "error": "Forbidden",
                      "message": "Acesso negado. É necessário uma API key válida; o endpoint /api/v1/directors está disponível apenas para o web-app."
                    }

# -----------------------------------------------------------------------------
# Rate limiting per identity
# -----------------------------------------------------------------------------
- name: Wait for the RateLimitPolicy CRD to be established
  kubernetes.core.k8s_info:
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: ratelimitpolicies.kuadrant.io
  register: _rlp_crd
  retries: "{{ crd_wait_retries }}"
  delay: "{{ crd_wait_delay }}"
  until: _rlp_crd.resources | length > 0

- name: Create the RateLimitPolicy on the movies-quarkus HTTPRoute
  kubernetes.core.k8s:
    definition:
      apiVersion: kuadrant.io/v1
      kind: RateLimitPolicy
      metadata:
        name: "{{ route_name }}-rlp"
        namespace: "{{ app_namespace }}"
      spec:
        targetRef:
          group: gateway.networking.k8s.io
          kind: HTTPRoute
          name: "{{ route_name }}"
        limits:
          web-app-limit:
            rates:
              - limit: "{{ rate_limits['web-app'].limit }}"
                window: "{{ rate_limits['web-app'].window }}"
            counters:
              - expression: auth.identity.userid
            when:
              # rate limit web-app traffic, but never the directors endpoint
              - predicate: "auth.identity.userid == 'web-app'"
              - predicate: "request.path != '{{ directors_path }}'"
          mobile-app-limit:
            rates:
              - limit: "{{ rate_limits['mobile-app'].limit }}"
                window: "{{ rate_limits['mobile-app'].window }}"
            counters:
              - expression: auth.identity.userid
            when:
              # rate limit mobile-app traffic, but never the directors endpoint
              - predicate: "auth.identity.userid == 'mobile-app'"
              - predicate: "request.path != '{{ directors_path }}'"
