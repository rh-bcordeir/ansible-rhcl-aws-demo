[defaults]
inventory = inventory.yml
host_key_checking = False
stdout_callback = yaml
retry_files_enabled = False
# Use the same Python that runs ansible-playbook (where the kubernetes lib lives)
interpreter_python = auto_silent
# Preserve native types (int/bool) when a value is a single Jinja expression.
# Required so e.g. RateLimitPolicy `limit` and Service `port` are sent to the
# Kubernetes API as integers instead of strings.
jinja2_native = True
