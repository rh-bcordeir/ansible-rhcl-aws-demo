---
# =============================================================================
# Global variables for the RHCL / Service Mesh 3 / OpenShift GitOps demo
# =============================================================================

# -----------------------------------------------------------------------------
# Operators (channels/sources verified against the target cluster catalog)
# -----------------------------------------------------------------------------
gitops_operator:
  name: openshift-gitops-operator
  namespace: openshift-operators        # cluster-scoped, AllNamespaces install
  channel: latest
  source: redhat-operators
  csv_prefix: openshift-gitops-operator
  create_namespace: false               # openshift-operators already exists
  create_operatorgroup: false           # global OperatorGroup already present

service_mesh_operator:
  name: servicemeshoperator3            # Red Hat OpenShift Service Mesh 3 (Sail)
  namespace: openshift-operators
  channel: stable
  source: redhat-operators
  csv_prefix: servicemeshoperator3
  create_namespace: false
  create_operatorgroup: false

rhcl_operator:
  name: rhcl-operator                   # Red Hat Connectivity Link (Kuadrant)
  namespace: kuadrant-system            # <-- installed in its own namespace
  channel: stable
  source: redhat-operators
  csv_prefix: rhcl-operator
  create_namespace: true
  create_operatorgroup: true            # AllNamespaces OperatorGroup (empty spec)

# OpenShift web-console plugins to enable. The RHCL operator ships the
# "kuadrant-console-plugin" ConsolePlugin but it is NOT enabled automatically;
# it must be added to the cluster Console operator config.
console_plugins_to_enable:
  - kuadrant-console-plugin

# -----------------------------------------------------------------------------
# Namespaces
# -----------------------------------------------------------------------------
kuadrant_system_namespace: kuadrant-system
istio_system_namespace: istio-system
istio_cni_namespace: istio-cni
api_gateway_namespace: api-gateway
app_namespace: cinema

# -----------------------------------------------------------------------------
# Gateway / routing
# -----------------------------------------------------------------------------
# Use "istio" when routing through Service Mesh 3 (default for this demo).
# Switch to "openshift-default" to use the built-in OpenShift Gateway controller.
gateway_class: istio
gateway_name: ingress-gateway

# Backend service that the HTTPRoute points to (lives in the "cinema" namespace,
# created by the movies-quarkus Helm chart). Confirm the real Service name after
# the ArgoCD application has synced:  oc get svc -n cinema
app_service_name: movies-quarkus
app_service_port: 8080
route_path_prefix: /api/v1/movies

# Name of the backing Deployment (used as the HTTPRoute "deployment" label so the
# Kuadrant kube-state-metrics exporter can join state metrics with Envoy/Istio
# traffic metrics). Defaults to the Service name.
app_deployment_name: movies-quarkus

# Single HTTPRoute for the whole movies-quarkus app. The standard Gateway API on
# this cluster does not support per-rule sectionName targeting, so instead of
# splitting endpoints across several routes we keep ONE route and differentiate
# behaviour inside a single AuthPolicy using per-rule `when` (request.path)
# predicates:
#   - /api/v1/movies*   : any valid API key
#   - /api/v1/directors : web-app identity only (others get 403)
#   - /q/openapi        : public (anonymous, overrides the gateway deny-all)
# backendRefs are injected automatically from app_service_name:app_service_port.
route_name: movies-quarkus
route_matches:
  - path: { type: Exact, value: /api/v1/movies }
    method: GET
  - path: { type: Exact, value: /api/v1/movies/drama }
    method: GET
  - path: { type: Exact, value: /api/v1/movies/comedia }
    method: GET
  - path: { type: Exact, value: /api/v1/movies }
    method: POST
  - path: { type: Exact, value: /api/v1/directors }
    method: GET
  - path: { type: PathPrefix, value: /q/openapi }

# Paths used by the AuthPolicy `when` predicates and the info/test output.
directors_path: /api/v1/directors
directors_allowed_user: web-app
public_path: /q/openapi

# -----------------------------------------------------------------------------
# Demo application (deployed through OpenShift GitOps / ArgoCD)
# -----------------------------------------------------------------------------
deploy_demo_app: true
argocd_namespace: openshift-gitops
demo_app:
  name: movies-quarkus
  repo_url: https://github.com/rh-bcordeir/movies-quarkus-devops
  # Path to the Helm chart inside the repo.
  path: chart
  target_revision: main
  # Helm values files, relative to the chart path above. If the file lives at
  # the repo root instead of inside the chart, use "../values/values-dev.yaml".
  value_files:
    - values/values-dev.yaml

# -----------------------------------------------------------------------------
# API keys consumed by the Authorino (RHCL) AuthPolicy
# -----------------------------------------------------------------------------
api_keys:
  - secret_name: web-app-key
    user_id: web-app
    api_key: CHAVE_DO_APP_WEB
  - secret_name: mobile-app-key
    user_id: mobile-app
    api_key: CHAVE_DO_APP_MOBILE

# Label that all API-key secrets share; the AuthPolicy selects on it.
api_key_app_label: movies-quarkus

# -----------------------------------------------------------------------------
# Rate limits (requests / window) per identity
# -----------------------------------------------------------------------------
rate_limits:
  web-app: { limit: 5, window: 10s }
  mobile-app: { limit: 2, window: 10s }

# -----------------------------------------------------------------------------
# Observability (RHCL / Kuadrant metrics + Grafana)
# -----------------------------------------------------------------------------
enable_observability: true

# Kustomize bundles from the Kuadrant Operator repo. Pin the refs to match the
# RHCL/Kuadrant version you installed.
#   - observability : installs kube-state-metrics-kuadrant (the gatewayapi_*
#                     metrics exporter) + the operator ServiceMonitors. The
#                     "gateway-system not found" errors it prints are expected
#                     and harmless (the operator already created the equivalent
#                     monitors in the api-gateway namespace).
#   - dashboards    : imports the example Kuadrant dashboards.
kuadrant_observability_kustomize: "https://github.com/Kuadrant/kuadrant-operator/config/install/configure/observability?ref=v1.2.0"
kuadrant_dashboards_kustomize: "https://github.com/Kuadrant/kuadrant-operator/examples/dashboards?ref=v1.4.0"

# Grafana (plain Deployment + Service + Route, no operator). Datasource is left
# out on purpose — point it at thanos-querier
# (https://thanos-querier.openshift-monitoring.svc.cluster.local:9091) with a
# Bearer token from the grafana-service-account (bound to cluster-monitoring-view
# below) and TLS skip-verify.
grafana_namespace: grafana
grafana_image: grafana/grafana:12.4.2
grafana_service_account: grafana-service-account

# Dashboard JSON files (in the project root). Loaded into ConfigMaps in the
# grafana namespace; import them into Grafana via the UI/API.
grafana_dashboard_files:
  - 20981_rev3.json
  - 20982_rev3.json
  - 21538_rev1.json

# -----------------------------------------------------------------------------
# Behaviour tuning
# -----------------------------------------------------------------------------
csv_wait_retries: 60
csv_wait_delay: 10
crd_wait_retries: 60
crd_wait_delay: 5
